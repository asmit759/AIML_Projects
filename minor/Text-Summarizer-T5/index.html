<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Summarizer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-black min-h-screen flex items-center justify-center px-4 text-white" style="font-family: 'Space Grotesk', sans-serif;">

    <div class="w-full max-w-3xl bg-white/[0.03] backdrop-blur-2xl shadow-2xl rounded-[32px] p-8 border border-white/10">
        
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-semibold tracking-tight">
                Text Summarizer
            </h1>

            <p class="text-gray-400 mt-3 text-base">
                Summarize long text instantly using HuggingFace Transformers.
            </p>
        </div>

        <form id="summarization-form" class="space-y-5">
            
            <textarea
                id="dialogue-input"
                placeholder="Paste your content here..."
                required
                class="w-full h-56 resize-none rounded-2xl border border-white/10 bg-white/[0.04] px-5 py-4 text-[15px] text-white placeholder:text-gray-500 outline-none focus:ring-2 focus:ring-white/10 focus:border-white/20 transition"
            ></textarea>

            <button
                type="submit"
                class="w-full bg-white text-black py-3 rounded-2xl text-sm font-medium hover:opacity-90 transition disabled:opacity-50"
            >
                Summarize
            </button>
        </form>

        <div
            id="summary-output"
            class="mt-8 rounded-2xl bg-white/[0.04] border border-white/10 p-6 min-h-[120px]"
        >
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-semibold">Summary</h2>
            </div>

            <p id="summary-text" class="text-gray-300 leading-7 text-[15px]">
                Your summarized content will appear here.
            </p>
        </div>
    </div>

    <script>
        document
            .getElementById("summarization-form")
            .addEventListener("submit", async (e) => {
                e.preventDefault();

                const dialogueInput = document.getElementById("dialogue-input");
                const summaryText = document.getElementById("summary-text");
                const submitButton = e.target.querySelector("button");

                const dialogue = dialogueInput.value.trim();
                if (!dialogue) return;

                summaryText.innerText = "Generating summary...";
                submitButton.disabled = true;
                submitButton.innerText = "Processing...";

                try {
                    const response = await fetch("/summarize/", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({ dialogue }),
                    });

                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }

                    const data = await response.json();

                    summaryText.innerText =
                        data.summary || "No summary returned.";
                } catch (err) {
                    summaryText.innerText = `Error: ${err.message}`;
                } finally {
                    submitButton.disabled = false;
                    submitButton.innerText = "Summarize";
                }
            });
    </script>
</body>
</html>
